openapi: 3.1.0
info:
  title: Amazon Application Migration Service API
  description: >-
    AWS Application Migration Service (MGN) is the primary migration service recommended for lift-and-shift migrations to AWS. It allows organizations to quickly realize the benefits of migrating applications to the cloud without changes and with minimal downtime.
  version: '2021-02-25'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/contact-us/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://mgn.us-east-1.amazonaws.com
    description: AWS Application Migration Service US East (N. Virginia)
  - url: https://mgn.eu-west-1.amazonaws.com
    description: AWS Application Migration Service EU (Ireland)
security:
  - awsAuth: []
tags:
  - name: Source Servers
    description: Manage source servers being migrated
  - name: Replication
    description: Replication configuration and templates
  - name: Launch
    description: Launch configuration and templates
  - name: Jobs
    description: Migration and conversion jobs
  - name: Applications
    description: Application groupings for migration
  - name: Waves
    description: Wave-based migration orchestration
  - name: Connectors
    description: On-premises connectors for agentless discovery
  - name: Lifecycle Hooks
    description: Lifecycle action hooks for automated workflows
  - name: Exports
    description: Source server export tasks
  - name: Imports
    description: Migration data imports
  - name: Tags
    description: Resource tagging operations
  - name: Vcenter Clients
    description: VMware vCenter client management
paths:
  /DescribeSourceServers:
    post:
      operationId: describeSourceServers
      summary: Amazon Application Migration Service Describe Source Servers
      description: Retrieves all source servers or filtered by replication type and lifecycle state.
      tags:
        - Source Servers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeSourceServersRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  filters:
                    isArchived: false
                  maxResults: 100
      responses:
        '200':
          description: Successful response with list of source servers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeSourceServersResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    items:
                      - sourceServerID: s-1234567890abcdef0
                        arn: arn:aws:mgn:us-east-1:123456789012:source-server/s-1234567890abcdef0
                        isArchived: false
                        tags: {}
                        launchedInstance:
                          ec2InstanceID: i-1234567890abcdef0
                          firstBoot: SUCCESS
                          jobID: mgnjob-1234567890abcdef0
                        dataReplicationInfo:
                          lagDuration: PT0S
                          lastSnapshotDateTime: '2026-04-19T00:00:00Z'
                          replicatedDisks: []
                          dataReplicationState: CONTINUOUS
                          dataReplicationInitiation:
                            steps: []
                        lifeCycle:
                          state: READY_FOR_CUTOVER
                        sourceProperties:
                          os:
                            fullString: Microsoft Windows Server 2019
                          ramBytes: 8589934592
                          cpus:
                            - cores: 4
                              modelName: Intel Xeon
                          networkInterfaces: []
                          recommendedInstanceType: t3.large
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /InitializeService:
    post:
      operationId: initializeService
      summary: Amazon Application Migration Service Initialize Service
      description: Initializes the Application Migration Service for a new AWS account.
      tags:
        - Source Servers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
            examples:
              default:
                x-microcks-default: true
                value: {}
      responses:
        '204':
          description: Service initialized successfully
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /MarkAsArchived:
    post:
      operationId: markAsArchived
      summary: Amazon Application Migration Service Mark As Archived
      description: Archives or unarchives a source server by its ID.
      tags:
        - Source Servers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkAsArchivedRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '200':
          description: Source server archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceServer'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    isArchived: true
                    arn: arn:aws:mgn:us-east-1:123456789012:source-server/s-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /DeleteSourceServer:
    post:
      operationId: deleteSourceServer
      summary: Amazon Application Migration Service Delete Source Server
      description: Deletes a single source server by ID. The source server must be disconnected.
      tags:
        - Source Servers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSourceServerRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '204':
          description: Source server deleted successfully
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /DisconnectFromService:
    post:
      operationId: disconnectFromService
      summary: Amazon Application Migration Service Disconnect From Service
      description: Disconnects a source server from the Application Migration Service replication process.
      tags:
        - Source Servers
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisconnectFromServiceRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '200':
          description: Source server disconnected successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceServer'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    isArchived: false
                    arn: arn:aws:mgn:us-east-1:123456789012:source-server/s-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /RetryDataReplication:
    post:
      operationId: retryDataReplication
      summary: Amazon Application Migration Service Retry Data Replication
      description: Retries data replication for a source server after a replication failure.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryDataReplicationRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '200':
          description: Data replication retry initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceServer'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    isArchived: false
                    arn: arn:aws:mgn:us-east-1:123456789012:source-server/s-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /GetReplicationConfiguration:
    post:
      operationId: getReplicationConfiguration
      summary: Amazon Application Migration Service Get Replication Configuration
      description: Retrieves the replication configuration for a specific source server.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetReplicationConfigurationRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '200':
          description: Replication configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplicationConfiguration'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    name: Default replication configuration
                    stagingAreaSubnetId: subnet-1234567890abcdef0
                    associateDefaultSecurityGroup: true
                    replicationServersSecurityGroupsIDs: []
                    replicationServerInstanceType: t3.small
                    useLowBandwidthForReplication: false
                    dataPlaneRouting: PRIVATE_IP
                    createPublicIP: false
                    stagingAreaTags: {}
                    replicatedDisks: []
                    bandwidthThrottling: 0
                    defaultLargeStagingDiskType: GP2
                    ebsEncryption: DEFAULT
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /UpdateReplicationConfiguration:
    post:
      operationId: updateReplicationConfiguration
      summary: Amazon Application Migration Service Update Replication Configuration
      description: Updates the replication configuration for a specific source server.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReplicationConfigurationRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
                  replicationServerInstanceType: t3.small
                  useLowBandwidthForReplication: false
      responses:
        '200':
          description: Replication configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplicationConfiguration'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    name: Updated configuration
                    replicationServerInstanceType: t3.small
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /DescribeReplicationConfigurationTemplates:
    post:
      operationId: describeReplicationConfigurationTemplates
      summary: Amazon Application Migration Service Describe Replication Configuration Templates
      description: Retrieves replication configuration templates with optional filtering.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeReplicationConfigurationTemplatesRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  maxResults: 100
      responses:
        '200':
          description: Replication configuration templates retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeReplicationConfigurationTemplatesResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    items:
                      - replicationConfigurationTemplateID: rct-1234567890abcdef0
                        arn: arn:aws:mgn:us-east-1:123456789012:replication-configuration-template/rct-1234567890abcdef0
                        stagingAreaSubnetId: subnet-1234567890abcdef0
                        associateDefaultSecurityGroup: true
                        replicationServerInstanceType: t3.small
                        useLowBandwidthForReplication: false
                        dataPlaneRouting: PRIVATE_IP
                        createPublicIP: false
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /CreateReplicationConfigurationTemplate:
    post:
      operationId: createReplicationConfigurationTemplate
      summary: Amazon Application Migration Service Create Replication Configuration Template
      description: Creates a new replication configuration template used as default settings for new source servers.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplicationConfigurationTemplateRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  stagingAreaSubnetId: subnet-1234567890abcdef0
                  associateDefaultSecurityGroup: true
                  replicationServersSecurityGroupsIDs: []
                  replicationServerInstanceType: t3.small
                  useLowBandwidthForReplication: false
                  dataPlaneRouting: PRIVATE_IP
                  createPublicIP: false
                  stagingAreaTags: {}
                  defaultLargeStagingDiskType: GP2
                  ebsEncryption: DEFAULT
                  bandwidthThrottling: 0
      responses:
        '201':
          description: Replication configuration template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplicationConfigurationTemplate'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    replicationConfigurationTemplateID: rct-1234567890abcdef0
                    arn: arn:aws:mgn:us-east-1:123456789012:replication-configuration-template/rct-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /UpdateReplicationConfigurationTemplate:
    post:
      operationId: updateReplicationConfigurationTemplate
      summary: Amazon Application Migration Service Update Replication Configuration Template
      description: Updates an existing replication configuration template.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReplicationConfigurationTemplateRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  replicationConfigurationTemplateID: rct-1234567890abcdef0
                  replicationServerInstanceType: t3.medium
      responses:
        '200':
          description: Replication configuration template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplicationConfigurationTemplate'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    replicationConfigurationTemplateID: rct-1234567890abcdef0
                    arn: arn:aws:mgn:us-east-1:123456789012:replication-configuration-template/rct-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /DeleteReplicationConfigurationTemplate:
    post:
      operationId: deleteReplicationConfigurationTemplate
      summary: Amazon Application Migration Service Delete Replication Configuration Template
      description: Deletes a replication configuration template by ID.
      tags:
        - Replication
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteReplicationConfigurationTemplateRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  replicationConfigurationTemplateID: rct-1234567890abcdef0
      responses:
        '204':
          description: Replication configuration template deleted
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /GetLaunchConfiguration:
    post:
      operationId: getLaunchConfiguration
      summary: Amazon Application Migration Service Get Launch Configuration
      description: Retrieves the launch configuration for a specific source server.
      tags:
        - Launch
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetLaunchConfigurationRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '200':
          description: Launch configuration retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunchConfiguration'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    name: Default launch configuration
                    ec2LaunchTemplateID: lt-1234567890abcdef0
                    launchDisposition: STOPPED
                    targetInstanceTypeRightSizingMethod: BASIC
                    copyPrivateIp: false
                    copyTags: false
                    licensing:
                      osByol: false
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /UpdateLaunchConfiguration:
    post:
      operationId: updateLaunchConfiguration
      summary: Amazon Application Migration Service Update Launch Configuration
      description: Updates the launch configuration for a specific source server.
      tags:
        - Launch
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLaunchConfigurationRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
                  launchDisposition: STARTED
                  copyTags: true
      responses:
        '200':
          description: Launch configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunchConfiguration'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    name: Updated launch configuration
                    launchDisposition: STARTED
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /DescribeLaunchConfigurationTemplates:
    post:
      operationId: describeLaunchConfigurationTemplates
      summary: Amazon Application Migration Service Describe Launch Configuration Templates
      description: Retrieves all launch configuration templates or specific ones by ID.
      tags:
        - Launch
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeLaunchConfigurationTemplatesRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  maxResults: 100
      responses:
        '200':
          description: Launch configuration templates retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeLaunchConfigurationTemplatesResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    items:
                      - launchConfigurationTemplateID: lct-1234567890abcdef0
                        arn: arn:aws:mgn:us-east-1:123456789012:launch-configuration-template/lct-1234567890abcdef0
                        launchDisposition: STOPPED
                        targetInstanceTypeRightSizingMethod: BASIC
                    nextToken: ''
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /CreateLaunchConfigurationTemplate:
    post:
      operationId: createLaunchConfigurationTemplate
      summary: Amazon Application Migration Service Create Launch Configuration Template
      description: Creates a new launch configuration template.
      tags:
        - Launch
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLaunchConfigurationTemplateRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  launchDisposition: STOPPED
                  targetInstanceTypeRightSizingMethod: BASIC
                  copyPrivateIp: false
                  copyTags: false
      responses:
        '201':
          description: Launch configuration template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunchConfigurationTemplate'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    launchConfigurationTemplateID: lct-1234567890abcdef0
                    arn: arn:aws:mgn:us-east-1:123456789012:launch-configuration-template/lct-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /UpdateLaunchConfigurationTemplate:
    post:
      operationId: updateLaunchConfigurationTemplate
      summary: Amazon Application Migration Service Update Launch Configuration Template
      description: Updates an existing launch configuration template.
      tags:
        - Launch
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLaunchConfigurationTemplateRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  launchConfigurationTemplateID: lct-1234567890abcdef0
                  launchDisposition: STARTED
      responses:
        '200':
          description: Launch configuration template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaunchConfigurationTemplate'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    launchConfigurationTemplateID: lct-1234567890abcdef0
                    arn: arn:aws:mgn:us-east-1:123456789012:launch-configuration-template/lct-1234567890abcdef0
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /DeleteLaunchConfigurationTemplate:
    post:
      operationId: deleteLaunchConfigurationTemplate
      summary: Amazon Application Migration Service Delete Launch Configuration Template
      description: Deletes a launch configuration template by ID.
      tags:
        - Launch
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteLaunchConfigurationTemplateRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  launchConfigurationTemplateID: lct-1234567890abcdef0
      responses:
        '204':
          description: Launch configuration template deleted
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /StartTest:
    post:
      operationId: startTest
      summary: Amazon Application Migration Service Start Test
      description: Launches a test instance for one or more source servers to validate migration readiness.
      tags:
        - Jobs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTestRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerIDs:
                    - s-1234567890abcdef0
      responses:
        '202':
          description: Test job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartTestResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    job:
                      jobID: mgnjob-1234567890abcdef0
                      type: TEST
                      status: STARTED
                      initiatedBy: START_TEST
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /StartCutover:
    post:
      operationId: startCutover
      summary: Amazon Application Migration Service Start Cutover
      description: Launches cutover instances for one or more source servers to complete migration.
      tags:
        - Jobs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartCutoverRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerIDs:
                    - s-1234567890abcdef0
      responses:
        '202':
          description: Cutover job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartCutoverResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    job:
                      jobID: mgnjob-1234567890abcdef0
                      type: LAUNCH
                      status: STARTED
                      initiatedBy: START_CUTOVER
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /FinalizeCutover:
    post:
      operationId: finalizeCutover
      summary: Amazon Application Migration Service Finalize Cutover
      description: Finalizes the cutover for a source server, completing the migration process.
      tags:
        - Jobs
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeCutoverRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  sourceServerID: s-1234567890abcdef0
      responses:
        '200':
          description: Cutover finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceServer'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    sourceServerID: s-1234567890abcdef0
                    isArchived: false
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
